url: https://rajlabmssm.github.io/downloadR/

template:
  bootstrap: 5
  bslib:
    bg: "#1a2744"
    fg: "#e8f4f4"
    primary: "#4ecdc4"
    secondary: "#3a8d8c"
    success: "#2ee8d6"
    info: "#5bc0be"
    code-bg: "#d6e4ee"
    code-color: "#1a2744"
    border-color: "#2a4060"
    link-color: "#4ecdc4"
    link-hover-color: "#2ee8d6"
    font-size-base: "1rem"
  includes:
    in_header: |
      <style>
      .navbar {
        background-color: #162038 !important;
        border-bottom: 2px solid #4ecdc4;
      }
      .navbar-brand, .nav-link { color: #e8f4f4 !important; }
      .nav-link:hover { color: #2ee8d6 !important; }
      .nav-link.active { color: #2ee8d6 !important; border-bottom: 2px solid #2ee8d6; }
      pre {
        background-color: #d6e4ee !important;
        color: #1a2744 !important;
        border: none !important;
        border-radius: 12px;
        margin: 0;
        padding: 0.8em 1em;
      }
      code { color: #1a6b68 !important; border: none !important; }
      pre code { color: #1a2744 !important; border: none !important; background: transparent !important; }
      pre code span { border: none !important; background: transparent !important; }
      .table { color: #e8f4f4 !important; }
      .table-striped > tbody > tr:nth-of-type(odd) > * {
        background-color: rgba(78, 205, 196, 0.05) !important;
        color: #e8f4f4 !important;
      }
      .table-striped > tbody > tr:nth-of-type(even) > * {
        background-color: transparent !important;
        color: #e8f4f4 !important;
      }
      .table > thead { border-bottom: 2px solid #4ecdc4; }
      h1, h2, h3, h4, h5, h6 { color: #4ecdc4 !important; }
      a { color: #5bc0be; }
      a:hover { color: #2ee8d6; }
      .card { background-color: #1e3050; border-color: #2a4060; }
      .footer { background-color: #162038 !important; border-top: 1px solid #2a4060; }
      .page-header { border-bottom: 2px solid #3a8d8c; }
      .sourceCode {
        background-color: #d6e4ee !important;
        border: 1px solid #3a8d8c;
        border-radius: 12px !important;
        overflow: hidden;
      }
      .sourceCode code span,
      .sourceCode code a {
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
        background: transparent !important;
      }
      </style>

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/RajLabMSSM/downloadR

articles:
  - title: Getting started
    contents:
      - downloadR

reference:
  - title: General downloaders
    desc: Core functions for downloading files via multiple methods
    contents:
      - downloader
      - download_vcf
      - load_rdata
  - title: AWS
    desc: Download files from Amazon Web Services S3 buckets
    contents:
      - aws
  - title: Figshare
    desc: List and download files from Figshare repositories
    contents:
      - figshare_list
      - figshare_download
  - title: Zenodo
    desc: List and upload files to Zenodo repositories
    contents:
      - zenodo_list
      - zenodo_upload
